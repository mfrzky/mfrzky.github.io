<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="App.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <title>Calculator</title>
</head>
<body>

    <div class="container mt-5">
        <div class="calculator">
            <div class="row">
                <input type="text" class="calculator-screen form-control p-5 text-right rounded" value="0" disabled>
                    <div class="calculator-keys">
                        <div class="row">
                            <button class="btn all-clear">AC</button>
                            <button class="btn percentage" value="%">%</button>
                            <button class="btn operator" value="/">&divide;</button>
                        </div>
                        <div class="row">
                            <button class="btn number" value="7">7</button>
                            <button class="btn number" value="8">8</button>
                            <button class="btn number" value="9">9</button>
                            <button class="btn operator" value="*">&times;</button>
                        </div>
                        <div class="row">
                            <button class="btn number" value="4">4</button>
                            <button class="btn number" value="5">5</button>
                            <button class="btn number" value="6">6</button>
                            <button class="btn operator" value="-">-</button>
                        </div>
                        <div class="row">
                            <button class="btn number" value="1">1</button>
                            <button class="btn number" value="2">2</button>
                            <button class="btn number" value="3">3</button>
                            <button class="btn operator" value="+">+</button>
                        </div>
                        <div class="row">
                            <button class="btn number zero-btn" value="0">0</button>
                            <button class="btn decimal" value=".">.</button>
                            <button class="btn equal-sign">=</button>
                        </div>
                    </div>
            </div>
        </div>
    </div>
    
    <script type="text/javascript" src="script.js"></script>
</body>
</html>
